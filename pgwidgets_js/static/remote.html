<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pgwidgets</title>
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "/Widgets.js";

    // Read WebSocket URL from query string, or derive from page protocol
    let params = new URLSearchParams(window.location.search);
    let wsScheme = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    let wsUrl = params.get('ws') || window.PGWIDGETS_WS_URL || `${wsScheme}//localhost:9500`;

    let remote = new Widgets.RemoteInterface(Widgets, {
        url: wsUrl
    });
  </script>
</body>
</html>
