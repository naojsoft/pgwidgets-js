<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
  <link rel="stylesheet" href="../css/MDIWidget.css" type="text/css" />
</head>
<body>
<div id="menu">
    <button type="button" id="cascade">Cascade</button> |
    <button type="button" id="tile">Tile</button>
</div>
<div  id="toplevel" style="display: flex; flex-grow: 1; flex-shrink: 1; align-items: stretch; align-content: stretch; box-sizing: border-box; flex-direction: row; flex-wrap: nowrap; height: 100vh;">
  <div style="border: 2px solid blue; ">
  You tell em, Sid! 
  </div>
  <div style="border: 2px solid red;">
   Blah blah blah!
  </div>
</div>
  <script type="module">
    import { MDIWidget } from "../modules/MDIWidget.js";
    const mdi_area = new MDIWidget(600, 600);
    let text = document.createTextNode("Hello, World!");
    mdi_area.add_widget(text, "Happy 2024", 400, 300)
    let text2 = document.createTextNode("Hello, Pappy!");
    mdi_area.add_widget(text2, "Yassir!", 300, 200)

    document.getElementById('toplevel').appendChild(mdi_area.get_element())

    // Example of tiling and cascading
    //mdi_area.tile_windows();
    //mdi_area.cascade_windows();
    document.getElementById('cascade').onclick = () => mdi_area.cascade_windows();
    document.getElementById('tile').onclick = () => mdi_area.tile_windows();

  </script>
</body>
</html>
