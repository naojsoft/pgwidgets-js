<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel({title: "MDI Widget Demo", resizable: true});
    top.resize(800, 600);

    let vbox = new Widgets.VBox();

    // --- Menu bar ---
    let menubar = new Widgets.MenuBar();

    let windowsMenu = new Widgets.Menu();
    let cascadeAction = windowsMenu.add_name("Cascade");
    let tileAction = windowsMenu.add_name("Tile");
    menubar.add_menu(windowsMenu, "Windows");

    vbox.add_widget(menubar, 0);

    // --- MDI area ---
    const mdi_area = new Widgets.MDIWidget();
    let text = new Widgets.Text({text: "Hello, World!"});
    mdi_area.add_widget(text, {title: "Happy 2024", width: 400, height: 300});
    text = new Widgets.Text({text: "Hello, Pappy!"});
    mdi_area.add_widget(text, {title: "Yassir!", width: 300, height: 200});

    vbox.add_widget(mdi_area, 1);

    top.set_widget(vbox);
    top.show();

    cascadeAction.add_callback('activated', () => mdi_area.cascade_windows());
    tileAction.add_callback('activated', () => mdi_area.tile_windows());

  </script>
</body>
</html>
