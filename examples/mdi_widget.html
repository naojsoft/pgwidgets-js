<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
</div>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    //top.set_size(1000, 700);

    let vbox = new Widgets.VBox();
    const mdi_area = new Widgets.MDIWidget();
    let text = new Widgets.Text({text: "Hello, World!"});
    mdi_area.add_widget(text, {title: "Happy 2024", width: 400, height: 300});
    text = new Widgets.Text({text: "Hello, Pappy!"});
    mdi_area.add_widget(text, {title: "Yassir!", width: 300, height: 200});

    let hbox = new Widgets.HBox();
    let bbox = new Widgets.ButtonBox();
    let btn1 = new Widgets.Button("Cascade");
    let btn2 = new Widgets.Button("Tile");
    bbox.add_widget(btn1);
    bbox.add_widget(new Widgets.Text({text: " | "}));
    bbox.add_widget(btn2);
    hbox.add_widget(bbox)
    hbox.add_widget(new Widgets.Text({text: ''}));
    vbox.add_widget(hbox, 0);
    vbox.add_widget(mdi_area, 1);
    
    top.set_widget(vbox);
    top.show();

    btn1.add_callback('activated', (w) => mdi_area.cascade_windows());
    btn2.add_callback('activated', (w) => mdi_area.tile_windows());

  </script>
</body>
</html>
