<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <!-- link rel="stylesheet" href="./css/Splitter.css" type="text/css" /-->
</head>
<body>
  <script type="module">
    import { Splitter, Text, TopLevel, Button, VBox } from "../Widgets.js";

    const vbox = new VBox();
    const btn = new Button("Add Child");
    vbox.add_widget(btn, 0);
    const splitter = new Splitter('horizontal');
    let w = new Text("Hello, World!")
    splitter.add_widget(w)
    w = new Text("Hello, Pappy!")
    splitter.add_widget(w)
    w = new Text("Hello, Mammy!");
    splitter.add_widget(w)
    vbox.add_widget(splitter, 1);

    let top = new TopLevel()
    top.set_widget(vbox)
    top.show()
    
  </script>
</body>
</html>
