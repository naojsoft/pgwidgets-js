<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    const vbox = new Widgets.VBox();
    vbox.set_spacing(2);
    const btn = new Widgets.Button("Add Child");
    vbox.add_widget(btn, 0);
    const splitter = new Widgets.Splitter({orientation: 'vertical'});
    let w = new Widgets.Text({text: "Hello, World!"})
    splitter.add_widget(w)
    w = new Widgets.Text({text: "Hello, Pappy!"})
    splitter.add_widget(w)
    w = new Widgets.Text({text: "Hello, Mammy!"});
    splitter.add_widget(w)
    vbox.add_widget(splitter, 1);

    let top = new Widgets.TopLevel();
    top.set_widget(vbox);
    top.resize(300, 1000);
    top.show();
    
  </script>
</body>
</html>
