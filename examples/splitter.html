<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(700, 500);

    // horizontal splitter with three panes
    const hsplitter = new Widgets.Splitter({orientation: 'horizontal'});
    hsplitter.add_widget(new Widgets.Text({text: "Left pane"}));

    // nest a vertical splitter in the middle pane
    const vsplitter = new Widgets.Splitter({orientation: 'vertical'});
    vsplitter.add_widget(new Widgets.Text({text: "Top middle"}));
    vsplitter.add_widget(new Widgets.Text({text: "Bottom middle"}));
    hsplitter.add_widget(vsplitter);

    hsplitter.add_widget(new Widgets.Text({text: "Right pane"}));

    top.set_widget(hsplitter);
    top.show();

  </script>
</body>
</html>
