<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel({title: "TreeView Demo", resizable: true});
    top.resize(600, 500);

    let vbox = new Widgets.VBox();
    vbox.set_padding(8);
    vbox.set_spacing(6);

    let status = new Widgets.Label("Select an item.");

    // -- Tree example --  (dict-tree format with stable key paths)
    const folderIcon = "../pgwidgets_js/static/icons/folder.svg";
    const fileIcon = "../pgwidgets_js/static/icons/file.svg";

    let tree = new Widgets.TreeView({
        columns: [
            // First column auto-fills from the node's dict key, so leaves
            // and interiors don't need to repeat their name in NAME.
            { label: "Name", key: "NAME", type: "string" },
            { label: "",     key: "ICON", type: "icon", icon_size: 16 },
            { label: "Type", key: "TYPE", type: "string" },
            { label: "Size (KB)", key: "SIZE", type: "integer" },
        ],
        selection_mode: "multiple",
        alternate_row_colors: true,
        sortable: true,
    });

    // Interior nodes use __values__ to attach their folder icon; their
    // dict key auto-fills the NAME column.  Leaves carry their own
    // column data; their NAME similarly auto-fills from the key.
    tree.set_tree({
        "Documents": {
            "__values__": { ICON: folderIcon, TYPE: "Folder" },
            "report.pdf": { ICON: fileIcon, TYPE: "PDF",  SIZE: 2400 },
            "notes.txt":  { ICON: fileIcon, TYPE: "Text", SIZE: 12 },
            "Presentations": {
                "__values__": { ICON: folderIcon, TYPE: "Folder" },
                "slides.pptx": { ICON: fileIcon, TYPE: "PowerPoint", SIZE: 5100 },
                "demo.key":    { ICON: fileIcon, TYPE: "Keynote",    SIZE: 8300 },
            },
        },
        "Pictures": {
            "__values__": { ICON: folderIcon, TYPE: "Folder" },
            "photo1.jpg": { ICON: fileIcon, TYPE: "JPEG", SIZE: 3200 },
            "photo2.png": { ICON: fileIcon, TYPE: "PNG",  SIZE: 1800 },
            "Vacation": {
                "__values__": { ICON: folderIcon, TYPE: "Folder" },
                "beach.jpg":     { ICON: fileIcon, TYPE: "JPEG", SIZE: 4100 },
                "sunset.jpg":    { ICON: fileIcon, TYPE: "JPEG", SIZE: 3900 },
                "mountains.jpg": { ICON: fileIcon, TYPE: "JPEG", SIZE: 5200 },
            },
        },
        "Music": {
            "__values__": { ICON: folderIcon, TYPE: "Folder" },
            "song1.mp3":  { ICON: fileIcon, TYPE: "MP3",  SIZE: 4500 },
            "song2.flac": { ICON: fileIcon, TYPE: "FLAC", SIZE: 32000 },
        },
    });

    tree.add_callback('selected', (w, items) => {
        if (items.length === 1) {
            status.set_text("Selected: " + items[0].path.join(" / "));
        } else {
            status.set_text("Selected: " + items.length + " items");
        }
    });

    tree.add_callback('activated', (w, values, path) => {
        status.set_text("Activated: " + path.join(" / "));
    });

    // -- Buttons --
    let hbox = new Widgets.HBox();
    hbox.set_spacing(4);

    let btnExpand = new Widgets.Button("Expand All");
    btnExpand.add_callback('activated', () => tree.expand_all());
    let btnCollapse = new Widgets.Button("Collapse All");
    btnCollapse.add_callback('activated', () => tree.collapse_all());
    hbox.add_widget(btnExpand, 0);
    hbox.add_widget(btnCollapse, 0);
    hbox.add_widget(new Widgets.Label("Click column headers to sort."), 0);

    vbox.add_widget(hbox, 0);
    vbox.add_widget(tree, 1);
    vbox.add_widget(status, 0);

    top.set_widget(vbox);
    top.show();
  </script>
</body>
</html>
