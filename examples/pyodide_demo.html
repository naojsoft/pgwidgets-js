<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pgwidgets Pyodide Demo</title>
  <link rel="stylesheet" href="../pgwidgets_js/static/Widgets.css" type="text/css" />
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: sans-serif; font-size: 18px; color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Pyodide...</div>

  <!-- Load pgwidgets JS modules so Widgets is available globally -->
  <script type="module">
    import { Widgets } from "../pgwidgets_js/static/Widgets.js";
    window.Widgets = Widgets;
    window._pgwidgetsReady = true;
  </script>

  <script type="module">
    // Wait for Widgets to be available
    function waitForWidgets() {
      return new Promise(resolve => {
        const check = () => {
          if (window._pgwidgetsReady) resolve();
          else setTimeout(check, 50);
        };
        check();
      });
    }

    await waitForWidgets();

    let pyodide = await loadPyodide();

    // Mount the pgwidgets_js package so Pyodide can import it
    let basePath = new URL('..', window.location.href).pathname;
    pyodide.FS.mkdirTree('/pgwidgets_js');
    pyodide.FS.mkdirTree('/pgwidgets_js/pyodide');

    // Fetch and mount the Python files
    async function mountFile(url, fsPath) {
      let resp = await fetch(url);
      let text = await resp.text();
      pyodide.FS.writeFile(fsPath, text);
    }

    await Promise.all([
      mountFile(basePath + 'pgwidgets_js/__init__.py', '/pgwidgets_js/__init__.py'),
      mountFile(basePath + 'pgwidgets_js/defs.py', '/pgwidgets_js/defs.py'),
      mountFile(basePath + 'pgwidgets_js/pyodide/__init__.py', '/pgwidgets_js/pyodide/__init__.py'),
      mountFile(basePath + 'pgwidgets_js/pyodide/widget.py', '/pgwidgets_js/pyodide/widget.py'),
    ]);

    // Add to Python path
    pyodide.runPython(`
import sys
if '/' not in sys.path:
    sys.path.insert(0, '/')
    `);

    document.getElementById('loading').remove();

    // Run the demo
    pyodide.runPython(`
from pgwidgets_js.pyodide import Widgets

top = Widgets.TopLevel(title="Pyodide Demo", resizable=True)
top.resize(600, 500)

vbox = Widgets.VBox(spacing=6, padding=8)

status = Widgets.Label("Select an item or interact with controls.")

# -- Some basic widgets --
hbox_controls = Widgets.HBox(spacing=6)
entry = Widgets.TextEntry(text="Type here")
entry.on("activated", lambda text: status.set_text(f"Entered: {text}"))

slider = Widgets.Slider(min=0, max=100, value=50, track=True)
slider.on("activated", lambda val: status.set_text(f"Slider: {val}"))

hbox_controls.add_widget(entry, 1)
hbox_controls.add_widget(slider, 1)

# -- TreeView --
tree = Widgets.TreeView(
    columns=[
        {"label": "Name", "key": "NAME", "type": "string"},
        {"label": "",     "key": "ICON", "type": "icon", "icon_size": 16},
        {"label": "Type", "key": "TYPE", "type": "string"},
        {"label": "Size (KB)", "key": "SIZE", "type": "integer"},
    ],
    selection_mode="multiple",
    alternate_row_colors=True,
    sortable=True,
)

folder_icon = "../pgwidgets_js/static/icons/folder.svg"
file_icon = "../pgwidgets_js/static/icons/file.svg"

tree.set_tree({
    "Documents": {
        "__values__": {"ICON": folder_icon, "TYPE": "Folder"},
        "report.pdf": {"ICON": file_icon, "TYPE": "PDF",  "SIZE": 2400},
        "notes.txt":  {"ICON": file_icon, "TYPE": "Text", "SIZE": 12},
    },
    "Pictures": {
        "__values__": {"ICON": folder_icon, "TYPE": "Folder"},
        "photo1.jpg": {"ICON": file_icon, "TYPE": "JPEG", "SIZE": 3200},
        "photo2.png": {"ICON": file_icon, "TYPE": "PNG",  "SIZE": 1800},
    },
    "Music": {
        "__values__": {"ICON": folder_icon, "TYPE": "Folder"},
        "song1.mp3":  {"ICON": file_icon, "TYPE": "MP3", "SIZE": 4500},
    },
})

def on_selected(items):
    if len(items) == 1:
        status.set_text(f"Selected: {items[0]['path']}")
    elif len(items) > 1:
        status.set_text(f"Selected: {len(items)} items")

tree.on("selected", on_selected)
tree.on("activated",
        lambda vals, path: status.set_text(f"Activated: {path}"))

# -- Buttons --
hbox_btns = Widgets.HBox(spacing=4)
btn_expand = Widgets.Button("Expand All")
btn_expand.on("activated", lambda: tree.expand_all())
btn_collapse = Widgets.Button("Collapse All")
btn_collapse.on("activated", lambda: tree.collapse_all())
hbox_btns.add_widget(btn_expand, 0)
hbox_btns.add_widget(btn_collapse, 0)
hbox_btns.add_widget(Widgets.Label("Click column headers to sort."), 0)

vbox.add_widget(hbox_controls, 0)
vbox.add_widget(hbox_btns, 0)
vbox.add_widget(tree, 1)
vbox.add_widget(status, 0)

top.set_widget(vbox)
top.show()

print("Pyodide demo ready!")
    `);
  </script>
</body>
</html>
