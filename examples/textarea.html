<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(500, 500);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(4);

    let label = new Widgets.Label("Editable text area:");
    vbox.add_widget(label, 0);

    let textarea = new Widgets.TextArea("Type here...", {editable: true, wrap: true});
    vbox.add_widget(textarea, 1);

    let hbox = new Widgets.HBox();
    hbox.set_spacing(4);

    let btn_get = new Widgets.Button("Get Text");
    let btn_set = new Widgets.Button("Set Text");
    let btn_append = new Widgets.Button("Append");
    hbox.add_widget(btn_get);
    hbox.add_widget(btn_set);
    hbox.add_widget(btn_append);
    vbox.add_widget(hbox, 0);

    let status = new Widgets.Text({text: ""});
    vbox.add_widget(status, 0);

    btn_get.add_callback('activated', (w) => {
        status.set_text("Length: " + textarea.get_text().length + " chars");
    });
    btn_set.add_callback('activated', (w) => {
        textarea.set_text("Text was replaced!");
    });
    btn_append.add_callback('activated', (w) => {
        textarea.append_text("\n(appended line)");
    });

    // read-only area
    let label2 = new Widgets.Label("Read-only text area:");
    vbox.add_widget(label2, 0);

    let readonly_area = new Widgets.TextArea("This text area is read-only.\nYou cannot edit it.", {editable: false});
    vbox.add_widget(readonly_area, 1);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
