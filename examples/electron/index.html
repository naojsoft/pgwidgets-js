<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pgwidgets Electron Demo</title>
  <link rel="stylesheet" href="../../pgwidgets_js/static/Widgets.css" />
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <script type="module">
    import { Widgets } from "../../pgwidgets_js/static/Widgets.js";

    let top = new Widgets.TopLevel({
      title: "pgwidgets in Electron",
      resizable: true,
    });
    top.resize(window.innerWidth - 4, window.innerHeight - 4);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(8);
    vbox.set_padding(12);

    // Menu bar
    let menubar = new Widgets.MenuBar();
    let fileMenu = new Widgets.Menu();
    let quitAction = fileMenu.add_name("Quit");
    quitAction.add_callback('activated', () => window.close());
    menubar.add_menu(fileMenu, "File");
    vbox.add_widget(menubar, 0);

    // Greeting + button
    let label = new Widgets.Label("Hello from Electron + pgwidgets!");
    label.set_font("sans-serif", 16, "bold");
    label.set_halign("center");
    vbox.add_widget(label, 0);

    let status = new Widgets.Label("Click the button below.");
    status.set_halign("center");
    vbox.add_widget(status, 0);

    let hbox = new Widgets.HBox();
    hbox.set_spacing(8);
    let count = 0;
    let btn = new Widgets.Button("Click me");
    btn.add_callback('activated', () => {
      count++;
      status.set_text(`Clicked ${count} time${count === 1 ? '' : 's'}`);
    });
    let reset = new Widgets.Button("Reset");
    reset.add_callback('activated', () => {
      count = 0;
      status.set_text("Reset.");
    });
    hbox.add_widget(new Widgets.Label(""), 1);
    hbox.add_widget(btn, 0);
    hbox.add_widget(reset, 0);
    hbox.add_widget(new Widgets.Label(""), 1);
    vbox.add_widget(hbox, 0);

    // TreeView demo
    let tree = new Widgets.TreeView({
      columns: [
        { label: "Name", key: "NAME", type: "string" },
        { label: "",     key: "ICON", type: "icon", icon_size: 16 },
        { label: "Type", key: "TYPE", type: "string" },
        { label: "Size (KB)", key: "SIZE", type: "integer" },
      ],
      selection_mode: "multiple",
      alternate_row_colors: true,
      sortable: true,
    });

    let fi = "../../pgwidgets_js/static/icons/folder.svg";
    let di = "../../pgwidgets_js/static/icons/file.svg";
    tree.set_tree({
      "Documents": {
        "__values__": { ICON: fi, TYPE: "Folder" },
        "report.pdf": { ICON: di, TYPE: "PDF",  SIZE: 2400 },
        "notes.txt":  { ICON: di, TYPE: "Text", SIZE: 12 },
      },
      "Pictures": {
        "__values__": { ICON: fi, TYPE: "Folder" },
        "photo.jpg": { ICON: di, TYPE: "JPEG", SIZE: 3200 },
      },
      "readme.txt": { ICON: di, TYPE: "Text", SIZE: 1 },
    });
    tree.add_callback('selected', (w, items) => {
      if (items.length === 1) {
        status.set_text(`Selected: ${items[0].path.join(" / ")}`);
      } else if (items.length > 1) {
        status.set_text(`Selected: ${items.length} items`);
      }
    });
    vbox.add_widget(tree, 1);

    top.set_widget(vbox);
    top.show();
  </script>
</body>
</html>
