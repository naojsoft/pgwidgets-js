<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel({title: "ScrollBar Demo", resizable: true});
    top.resize(500, 400);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(8);
    vbox.set_padding(10);

    let status = new Widgets.Label("Drag the scrollbars or click the track.");
    status.set_padding([6, 4, 6, 4]);

    // --- Horizontal scrollbar ---
    let frame1 = new Widgets.Frame({title: "Horizontal ScrollBar"});
    let hbox1 = new Widgets.VBox();
    hbox1.set_spacing(4);
    hbox1.set_padding(6);

    let hsb = new Widgets.ScrollBar({orientation: 'horizontal'});
    hsb.set_thumb_width(0.2);
    hsb.set_scroll_percent(0);
    hsb.add_callback('activated', (w, pct) => {
        status.set_text("Horizontal: " + (pct * 100).toFixed(1) + "%");
    });
    hbox1.add_widget(hsb, 0);
    frame1.set_widget(hbox1);
    vbox.add_widget(frame1, 0);

    // --- Horizontal with wide thumb ---
    let frame2 = new Widgets.Frame({title: "Horizontal (wide thumb, 50%)"});
    let hbox2 = new Widgets.VBox();
    hbox2.set_spacing(4);
    hbox2.set_padding(6);

    let hsb2 = new Widgets.ScrollBar({orientation: 'horizontal'});
    hsb2.set_thumb_width(0.5);
    hsb2.set_scroll_percent(0.3);
    hsb2.add_callback('activated', (w, pct) => {
        status.set_text("Wide thumb: " + (pct * 100).toFixed(1) + "%");
    });
    hbox2.add_widget(hsb2, 0);
    frame2.set_widget(hbox2);
    vbox.add_widget(frame2, 0);

    // --- Vertical scrollbar in an HBox ---
    let frame3 = new Widgets.Frame({title: "Vertical ScrollBar"});
    let hbox3 = new Widgets.HBox();
    hbox3.set_spacing(8);
    hbox3.set_padding(6);

    let contentLabel = new Widgets.Label("Scroll the vertical bar on the right.");
    hbox3.add_widget(contentLabel, 1);

    let vsb = new Widgets.ScrollBar({orientation: 'vertical'});
    vsb.set_thumb_width(0.3);
    vsb.set_scroll_percent(0);
    vsb.add_callback('activated', (w, pct) => {
        status.set_text("Vertical: " + (pct * 100).toFixed(1) + "%");
    });
    hbox3.add_widget(vsb, 0);
    frame3.set_widget(hbox3);
    vbox.add_widget(frame3, 1);

    // status
    vbox.add_widget(status, 0);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
