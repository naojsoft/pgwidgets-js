<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    // --- Full-page TopLevel with MDI workspace ---
    let top = new Widgets.TopLevel({title: "All Widgets Demo", resizable: true});
    top.resize(window.innerWidth - 4, window.innerHeight - 4);

    let vbox = new Widgets.VBox();

    // --- Menu bar ---
    let menubar = new Widgets.MenuBar();
    let windowsMenu = new Widgets.Menu();
    let cascadeAction = windowsMenu.add_name("Cascade");
    let tileAction = windowsMenu.add_name("Tile");
    menubar.add_menu(windowsMenu, "Windows");
    vbox.add_widget(menubar, 0);

    // --- MDI area ---
    let mdi = new Widgets.MDIWidget();
    vbox.add_widget(mdi, 1);

    cascadeAction.add_callback('activated', () => mdi.cascade_windows());
    tileAction.add_callback('activated', () => mdi.tile_windows());

    // --- Picker dialog (always visible in the MDI) ---
    let pickerContent = new Widgets.VBox();
    pickerContent.set_spacing(6);
    pickerContent.set_padding(8);

    let pickerLabel = new Widgets.TextEntry({text: "Pick a widget:", editable: false});
    pickerContent.add_widget(pickerLabel, 0);

    let widgetNames = [
        "Button", "CheckBox", "ColorWidget", "ComboBox", "Dial",
        "Expander", "Frame", "GridBox", "HtmlView", "Image", "Label",
        "ProgressBar", "RadioButton", "ScrollArea", "ScrollBar",
        "Slider", "SpinBox", "Splitter", "StackWidget",
        "TabWidget", "TableView",
        "TextArea", "TextEntry", "TextEntrySet", "TextSource",
        "ToggleButton", "ToolBar", "TreeView", "VBox/HBox"
    ];
    let picker = new Widgets.ComboBox({dropdown_limit: 8});
    for (let name of widgetNames) {
        picker.append_text(name);
    }
    picker.set_index(0);
    pickerContent.add_widget(picker, 0);
    let goBtn = new Widgets.Button("Go!");
    pickerContent.add_widget(goBtn, 0);
    pickerContent.add_widget(new Widgets.Label(""), 1);

    let pickerWin = mdi.add_widget(pickerContent, {title: "Widget Picker", width: 220, height: 150});
    pickerWin.get_element().style.left = '10px';
    pickerWin.get_element().style.top = '10px';

    // --- Status label at the bottom ---
    let status = new Widgets.Label("Select a widget from the picker to see a demo.");
    status.set_padding([6, 4, 6, 4]);
    vbox.add_widget(status, 0);

    // --- Demo creation functions ---
    let demoCount = 0;

    function nextPosition() {
        demoCount++;
        return { x: 40 + (demoCount % 6) * 25, y: 20 + (demoCount % 6) * 25 };
    }

    function makeDemo(name) {
        let pos = nextPosition();
        let content, subwin;

        switch (name) {

        case "Button": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let hbox = new Widgets.HBox();
            hbox.set_spacing(6);
            let lbl = new Widgets.Label("");
            let btnA = new Widgets.Button("Button A");
            btnA.add_callback('activated', () => { lbl.set_text("Button A clicked"); });
            let btnB = new Widgets.Button("Button B");
            btnB.add_callback('activated', () => { lbl.set_text("Button B clicked"); });
            let btnIcon = new Widgets.Button("With Icon");
            btnIcon.set_icon("../pgwidgets_js/static/icons/pgicon.svg", [16, 16]);
            btnIcon.add_callback('activated', () => { lbl.set_text("Icon button clicked"); });
            hbox.add_widget(btnA, 0);
            hbox.add_widget(btnB, 0);
            hbox.add_widget(btnIcon, 0);
            content.add_widget(hbox, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "Button", width: 350, height: 120});
            break;
        }

        case "CheckBox": {
            content = new Widgets.VBox();
            content.set_spacing(4);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            let cb1 = new Widgets.CheckBox("Option 1");
            cb1.add_callback('activated', (w, val) => lbl.set_text("Option 1: " + (val ? "ON" : "OFF")));
            let cb2 = new Widgets.CheckBox("Option 2");
            cb2.add_callback('activated', (w, val) => lbl.set_text("Option 2: " + (val ? "ON" : "OFF")));
            let cb3 = new Widgets.CheckBox("Option 3");
            cb3.add_callback('activated', (w, val) => lbl.set_text("Option 3: " + (val ? "ON" : "OFF")));
            content.add_widget(cb1, 0);
            content.add_widget(cb2, 0);
            content.add_widget(cb3, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "CheckBox", width: 250, height: 160});
            break;
        }

        case "ComboBox": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            content.add_widget(new Widgets.Label("Pick-only:"), 0);
            let combo1 = new Widgets.ComboBox();
            for (let f of ["Apple", "Banana", "Cherry", "Date", "Elderberry"]) {
                combo1.append_text(f);
            }
            combo1.set_index(0);
            combo1.add_callback('activated', (w, idx, text) => lbl.set_text("Picked: " + text));
            content.add_widget(combo1, 0);
            content.add_widget(new Widgets.Label("Editable:"), 0);
            let combo2 = new Widgets.ComboBox({editable: true, dropdown_limit: 5});
            for (let f of ["Red", "Orange", "Yellow", "Green", "Blue", "Indigo", "Violet"]) {
                combo2.append_text(f);
            }
            combo2.add_callback('activated', (w, idx, text) => lbl.set_text("Entered: " + text));
            content.add_widget(combo2, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "ComboBox", width: 280, height: 200});
            break;
        }

        case "ColorWidget": {
            let cw = new Widgets.ColorWidget({color: '#3366cc'});
            cw.add_callback('pick', (w, color) => {
                status.set_text("Picking: " + color);
            });
            subwin = mdi.add_widget(cw, {title: "ColorWidget", width: 420, height: 240});
            break;
        }

        case "Dial": {
            content = new Widgets.HBox();
            content.set_spacing(8);
            content.set_padding(8);
            let lbl = new Widgets.Label("50");
            let dial1 = new Widgets.Dial({min: 0, max: 100, value: 50, track: true});
            dial1.add_callback('activated', (w, val) => lbl.set_text(String(val)));
            let dial2 = new Widgets.Dial({min: 0, max: 100, value: 25});
            dial2.add_callback('activated', (w, val) => lbl.set_text(String(val)));
            let dial3 = new Widgets.Dial({min: 0, max: 100, value: 75, track: true});
            dial3.set_icon("../pgwidgets_js/static/icons/pgwidgets-logo.svg");
            dial3.add_callback('activated', (w, val) => lbl.set_text(String(val)));
            content.add_widget(dial1, 0);
            content.add_widget(dial2, 0);
            content.add_widget(dial3, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "Dial", width: 420, height: 160});
            break;
        }

        case "Expander": {
            content = new Widgets.VBox();
            content.set_spacing(4);
            content.set_padding(8);
            let exp1 = new Widgets.Expander({title: "Section A", collapsible: true});
            exp1.set_widget(new Widgets.Label("Content of section A."));
            let exp2 = new Widgets.Expander({title: "Section B", collapsible: true});
            exp2.set_widget(new Widgets.Label("Content of section B."));
            content.add_widget(exp1, 0);
            content.add_widget(exp2, 0);
            content.add_widget(new Widgets.Label(""), 1);
            subwin = mdi.add_widget(content, {title: "Expander", width: 280, height: 180});
            break;
        }

        case "Frame": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let frame1 = new Widgets.Frame({title: "Titled Frame"});
            frame1.set_widget(new Widgets.Label("Content inside a frame."));
            let frame2 = new Widgets.Frame({title: "Another Frame"});
            frame2.set_widget(new Widgets.Label("More framed content."));
            content.add_widget(frame1, 1);
            content.add_widget(frame2, 1);
            subwin = mdi.add_widget(content, {title: "Frame", width: 280, height: 200});
            break;
        }

        case "GridBox": {
            content = new Widgets.VBox();
            content.set_padding(8);
            content.set_spacing(6);
            let lbl = new Widgets.Label("");
            let grid = new Widgets.GridBox({rows: 3, columns: 3});
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    let btn = new Widgets.Button(`(${r},${c})`);
                    btn.add_callback('activated', () => lbl.set_text(`Clicked row=${r} col=${c}`));
                    grid.add_widget(btn, r, c);
                }
            }
            content.add_widget(grid, 1);
            content.add_widget(lbl, 0);
            subwin = mdi.add_widget(content, {title: "GridBox", width: 280, height: 200});
            break;
        }

        case "HtmlView": {
            content = new Widgets.VBox();
            content.set_spacing(4);
            content.set_padding(4);
            let hbox = new Widgets.HBox();
            hbox.set_spacing(4);
            let btnRich = new Widgets.Button("Rich HTML");
            let btnTable = new Widgets.Button("Table");
            let btnAppend = new Widgets.Button("Append");
            let btnClear = new Widgets.Button("Clear");
            hbox.add_widget(btnRich, 0);
            hbox.add_widget(btnTable, 0);
            hbox.add_widget(btnAppend, 0);
            hbox.add_widget(btnClear, 0);
            content.add_widget(hbox, 0);
            let hv = new Widgets.HtmlView();
            content.add_widget(hv, 1);
            let sampleHtml = '<h3 style="color:#336">HtmlView</h3>' +
                '<p>Displays <b>rich HTML</b> with pgwidgets scrollbars.</p>' +
                '<ul><li>Headings, lists, tables</li><li>Inline styles</li>' +
                '<li>Any valid HTML</li></ul>' +
                '<p style="background:#e8f0fe;padding:6px;border-radius:4px;">' +
                'Styled block.</p>';
            hv.set_html(sampleHtml);
            btnRich.add_callback('activated', () => hv.set_html(sampleHtml));
            btnTable.add_callback('activated', () => {
                let rows = '';
                for (let i = 1; i <= 20; i++) {
                    let bg = i % 2 === 0 ? '#f8f8f8' : '#fff';
                    rows += '<tr style="background:' + bg + '">' +
                        '<td style="padding:3px 6px">' + i + '</td>' +
                        '<td style="padding:3px 6px">Item ' + i + '</td>' +
                        '<td style="padding:3px 6px">' + (Math.random() * 100).toFixed(1) + '</td></tr>';
                }
                hv.set_html('<table style="border-collapse:collapse;width:100%">' +
                    '<thead><tr style="background:#336;color:#fff">' +
                    '<th style="padding:4px 6px;text-align:left">#</th>' +
                    '<th style="padding:4px 6px;text-align:left">Name</th>' +
                    '<th style="padding:4px 6px;text-align:left">Value</th>' +
                    '</tr></thead><tbody>' + rows + '</tbody></table>');
            });
            let n = 0;
            btnAppend.add_callback('activated', () => {
                n++;
                hv.append_html('<p style="margin:3px 0;padding:3px;background:#fef7e0;' +
                    'border-radius:3px;">Paragraph #' + n + '</p>');
            });
            btnClear.add_callback('activated', () => { hv.clear(); n = 0; });
            subwin = mdi.add_widget(content, {title: "HtmlView", width: 380, height: 300});
            break;
        }

        case "Image": {
            let img = new Widgets.Image({url: "../pgwidgets_js/static/icons/pgwidgets-logo.svg"});
            subwin = mdi.add_widget(img, {title: "Image", width: 360, height: 240});
            break;
        }

        case "Label": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl1 = new Widgets.Label("Default label");
            let lbl2 = new Widgets.Label("Centered, colored");
            lbl2.set_halign("center");
            lbl2.set_color("#eef", "darkblue");
            let lbl3 = new Widgets.Label("Monospace, bold");
            lbl3.set_font("monospace", 12, "bold");
            content.add_widget(lbl1, 0);
            content.add_widget(lbl2, 0);
            content.add_widget(lbl3, 0);
            content.add_widget(new Widgets.Label(""), 1);
            subwin = mdi.add_widget(content, {title: "Label", width: 260, height: 150});
            break;
        }

        case "ProgressBar": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let pb = new Widgets.ProgressBar();
            pb.set_value(0.65);
            let slider = new Widgets.Slider({min: 0, max: 100, value: 65, track: true});
            slider.add_callback('activated', (w, val) => pb.set_value(val / 100));
            content.add_widget(new Widgets.Label("Drag slider to change progress:"), 0);
            content.add_widget(slider, 0);
            content.add_widget(pb, 0);
            content.add_widget(new Widgets.Label(""), 1);
            subwin = mdi.add_widget(content, {title: "ProgressBar", width: 320, height: 150});
            break;
        }

        case "RadioButton": {
            content = new Widgets.VBox();
            content.set_spacing(4);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            let rb1 = new Widgets.RadioButton("Choice A");
            rb1.add_callback('activated', (w, val) => { if (val) lbl.set_text("Selected: A"); });
            let rb2 = new Widgets.RadioButton("Choice B", {group: rb1});
            rb2.add_callback('activated', (w, val) => { if (val) lbl.set_text("Selected: B"); });
            let rb3 = new Widgets.RadioButton("Choice C", {group: rb1});
            rb3.add_callback('activated', (w, val) => { if (val) lbl.set_text("Selected: C"); });
            rb1.set_state(true);
            content.add_widget(rb1, 0);
            content.add_widget(rb2, 0);
            content.add_widget(rb3, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "RadioButton", width: 250, height: 160});
            break;
        }

        case "ScrollArea": {
            let bigContent = new Widgets.VBox();
            bigContent.set_spacing(4);
            bigContent.set_padding(8);
            for (let i = 0; i < 30; i++) {
                let row = new Widgets.HBox();
                row.set_spacing(4);
                for (let j = 0; j < 8; j++) {
                    let lbl = new Widgets.Label(`Item ${i * 8 + j}`);
                    lbl.set_padding([2, 6, 2, 6]);
                    lbl.set_color(i % 2 === 0 ? "#f8f8f8" : "#fff", "#333");
                    row.add_widget(lbl, 0);
                }
                bigContent.add_widget(row, 0);
            }
            let scroll = new Widgets.ScrollArea();
            scroll.set_widget(bigContent);
            subwin = mdi.add_widget(scroll, {title: "ScrollArea", width: 320, height: 200});
            break;
        }

        case "ScrollBar": {
            content = new Widgets.VBox();
            content.set_spacing(8);
            content.set_padding(8);
            let lbl = new Widgets.Label("0%");
            content.add_widget(new Widgets.Label("Horizontal:"), 0);
            let hsb = new Widgets.ScrollBar({orientation: 'horizontal'});
            hsb.set_thumb_percent(0.2);
            hsb.add_callback('activated', (w, pct) => lbl.set_text((pct * 100).toFixed(0) + "%"));
            content.add_widget(hsb, 0);
            let hbox = new Widgets.HBox();
            hbox.set_spacing(8);
            hbox.add_widget(new Widgets.Label("Vertical:"), 0);
            let vsb = new Widgets.ScrollBar({orientation: 'vertical'});
            vsb.set_thumb_percent(0.3);
            vsb.add_callback('activated', (w, pct) => lbl.set_text((pct * 100).toFixed(0) + "%"));
            hbox.add_widget(vsb, 0);
            hbox.add_widget(lbl, 1);
            content.add_widget(hbox, 1);
            subwin = mdi.add_widget(content, {title: "ScrollBar", width: 280, height: 200});
            break;
        }

        case "Slider": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            let sl1 = new Widgets.Slider({min: 0, max: 100, value: 50});
            sl1.add_callback('activated', (w, val) => lbl.set_text("Integer: " + val));
            let sl2 = new Widgets.Slider({min: 0, max: 1, step: 0.01, value: 0.5, dtype: 'float', track: true});
            sl2.add_callback('activated', (w, val) => lbl.set_text("Float: " + val));
            content.add_widget(new Widgets.Label("Integer (0–100):"), 0);
            content.add_widget(sl1, 0);
            content.add_widget(new Widgets.Label("Float tracking (0–1):"), 0);
            content.add_widget(sl2, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "Slider", width: 320, height: 180});
            break;
        }

        case "SpinBox": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            content.add_widget(new Widgets.Label("Integer (0–100):"), 0);
            let sp1 = new Widgets.SpinBox({min: 0, max: 100, step: 1, value: 50});
            sp1.add_callback('activated', (w, val) => lbl.set_text("Int: " + val));
            content.add_widget(sp1, 0);
            content.add_widget(new Widgets.Label("Float (0–1):"), 0);
            let sp2 = new Widgets.SpinBox({min: 0, max: 1, step: 0.05, value: 0.5, dtype: 'float'});
            sp2.add_callback('activated', (w, val) => lbl.set_text("Float: " + val));
            content.add_widget(sp2, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "SpinBox", width: 280, height: 180});
            break;
        }

        case "Splitter": {
            content = new Widgets.VBox();
            content.set_padding(2);
            content.set_spacing(4);
            let lbl = new Widgets.Label("Drag the handles to resize panes.");
            let hsplit = new Widgets.Splitter({orientation: 'horizontal'});
            hsplit.set_border_width(1);
            hsplit.set_border_color("black");
            let pane1 = new Widgets.Label("Left");
            pane1.set_halign("center");
            pane1.set_color("#e8f0fe", "#333");
            let pane2 = new Widgets.Label("Center");
            pane2.set_halign("center");
            pane2.set_color("#fef7e0", "#333");
            let pane3 = new Widgets.Label("Right");
            pane3.set_halign("center");
            pane3.set_color("#e8fee8", "#333");
            hsplit.add_widget(pane1);
            hsplit.add_widget(pane2);
            hsplit.add_widget(pane3);
            content.add_widget(hsplit, 1);
            content.add_widget(lbl, 0);
            subwin = mdi.add_widget(content, {title: "Splitter", width: 360, height: 180});
            break;
        }

        case "StackWidget": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("Page 1 visible");
            let stack = new Widgets.StackWidget();
            let pages = [];
            let colors = ["#e8f0fe", "#fef7e0", "#e8fee8"];
            for (let n = 1; n <= 3; n++) {
                let pg = new Widgets.VBox();
                pg.set_padding(8);
                let pgLbl = new Widgets.Label("Stack page " + n);
                pgLbl.set_halign("center");
                pgLbl.set_color(colors[n - 1], "#333");
                pg.add_widget(pgLbl, 1);
                stack.add_widget(pg, {title: "Page " + n});
                pages.push({widget: pg, name: "Page " + n});
            }
            let btnRow = new Widgets.HBox();
            btnRow.set_spacing(4);
            for (let p of pages) {
                let btn = new Widgets.Button(p.name);
                btn.add_callback('activated', () => {
                    stack.show_widget(p.widget);
                    lbl.set_text(p.name + " visible");
                });
                btnRow.add_widget(btn, 0);
            }
            content.add_widget(btnRow, 0);
            content.add_widget(stack, 1);
            content.add_widget(lbl, 0);
            subwin = mdi.add_widget(content, {title: "StackWidget", width: 300, height: 200});
            break;
        }

        case "TabWidget": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            let tabs = new Widgets.TabWidget({closable: true, reorderable: true});
            let colors = ["#e8f0fe", "#fef7e0", "#e8fee8"];
            for (let n = 1; n <= 3; n++) {
                let pg = new Widgets.VBox();
                pg.set_padding(8);
                let pgLbl = new Widgets.Label("Content of tab " + n);
                pgLbl.set_halign("center");
                pgLbl.set_color(colors[n - 1], "#333");
                pg.add_widget(pgLbl, 1);
                tabs.add_widget(pg, {title: "Tab " + n});
            }
            tabs.add_callback('page-switch', (w, child, idx) => {
                lbl.set_text("Switched to tab " + idx);
            });
            let tabCounter = 3;
            let addBtn = new Widgets.Button("Add Tab");
            addBtn.add_callback('activated', () => {
                tabCounter++;
                let pg = new Widgets.VBox();
                pg.set_padding(8);
                let pgLbl = new Widgets.Label("Content of tab " + tabCounter);
                pgLbl.set_halign("center");
                pg.add_widget(pgLbl, 1);
                tabs.add_widget(pg, {title: "Tab " + tabCounter});
                lbl.set_text("Added tab " + tabCounter);
            });
            content.add_widget(tabs, 1);
            let btnRow = new Widgets.HBox();
            btnRow.set_spacing(6);
            btnRow.add_widget(addBtn, 0);
            btnRow.add_widget(lbl, 1);
            content.add_widget(btnRow, 0);
            subwin = mdi.add_widget(content, {title: "TabWidget", width: 350, height: 220});
            break;
        }

        case "TableView": {
            content = new Widgets.VBox();
            content.set_spacing(4);
            let lbl = new Widgets.Label("");
            let table = new Widgets.TableView({
                columns: [
                    {label: "Name",       key: "NAME",   type: "string"},
                    {label: "Department", key: "DEPT",   type: "string"},
                    {label: "Salary",     key: "SALARY", type: "integer"},
                ],
                selection_mode: "multiple",
                alternate_row_colors: true,
                sortable: true,
            });
            table.set_data([
                {NAME: "Alice", DEPT: "Engineering", SALARY: 95000},
                {NAME: "Bob",   DEPT: "Marketing",   SALARY: 72000},
                {NAME: "Carol", DEPT: "Engineering", SALARY: 102000},
                {NAME: "Dave",  DEPT: "Sales",       SALARY: 68000},
                {NAME: "Eve",   DEPT: "Engineering", SALARY: 98000},
                {NAME: "Frank", DEPT: "Marketing",   SALARY: 75000},
                {NAME: "Grace", DEPT: "Sales",       SALARY: 71000},
                {NAME: "Heidi", DEPT: "Engineering", SALARY: 110000},
            ]);
            table.add_callback('selected', (w, items) => {
                if (items.length === 1) {
                    lbl.set_text("Selected: " + items[0].values.NAME);
                } else {
                    lbl.set_text("Selected: " + items.length + " rows");
                }
            });
            table.add_callback('activated', (w, vals, path) =>
                lbl.set_text("Activated: " + vals.NAME));
            let hbox = new Widgets.HBox();
            hbox.set_spacing(4);
            let rowNum = 8;
            let addBtn = new Widgets.Button("Add Row");
            addBtn.add_callback('activated', () => {
                rowNum++;
                table.append_row({NAME: "Person " + rowNum,
                                  DEPT: "New", SALARY: 60000});
            });
            let sortBtn = new Widgets.Button("Sort by Name");
            sortBtn.add_callback('activated', () => table.sort_by_column("NAME"));
            hbox.add_widget(addBtn, 0);
            hbox.add_widget(sortBtn, 0);
            hbox.add_widget(lbl, 1);
            content.add_widget(hbox, 0);
            content.add_widget(table, 1);
            subwin = mdi.add_widget(content, {title: "TableView", width: 420, height: 280});
            break;
        }

        case "TextArea": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);

            let ta = new Widgets.TextArea("This is a multi-line text area.\n\nYou can type freely here.\nResize the window to see it adapt.");
            content.add_widget(ta, 1);

            // --- Drag-drop demo ---
            let dropLabel = new Widgets.Label("Drag text or a file onto the drop zone to load it into the text area:");
            dropLabel.set_font(null, 11);
            content.add_widget(dropLabel, 0);

            let dropZone = new Widgets.Label("Drop here");
            dropZone.set_halign("center");
            dropZone.set_color("#e8f0fe", "#4a86c8");
            dropZone.set_font(null, 14);
            dropZone.element.style.border = "2px dashed #4a86c8";
            dropZone.element.style.borderRadius = "8px";
            dropZone.element.style.padding = "16px";
            dropZone.enable_callback('drag-over');
            dropZone.enable_callback('drop-end');
            dropZone.add_callback('drop-end', (w, evt) => {
                // Try file contents first (read as data URI, decode text).
                if (evt.files && evt.files.length > 0) {
                    let file = evt.files[0];
                    if (file.data) {
                        // data URI -> extract base64 payload -> decode
                        let base64 = file.data.split(',')[1];
                        let text = atob(base64);
                        ta.set_text(text);
                        status.set_text("Loaded file: " + file.name);
                    }
                } else if (evt.text) {
                    ta.set_text(evt.text);
                    status.set_text("Loaded dropped text");
                }
            });
            content.add_widget(dropZone, 0);

            subwin = mdi.add_widget(content, {title: "TextArea", width: 360, height: 300});
            break;
        }

        case "TextSource": {
            let initial =
                "// TextSource widget demo\n" +
                "function hello(name) {\n" +
                "    console.log('Hello, ' + name + '!');\n" +
                "}\n" +
                "\n" +
                "hello('world');\n" +
                "\n" +
                "// Line numbers, icon gutter, tags, undo/redo.\n";
            let src = new Widgets.TextSource(initial, {
                wrap: 'none',
                line_numbers: true,
                icon_gutter: true,
            });
            // Define some tags and apply them to the initial text
            src.create_tag("comment", { foreground: "#888", italic: true });
            src.create_tag("keyword", { foreground: "#0066cc", bold: true });
            src.create_tag("string",  { foreground: "#a31515" });
            let text = src.get_text();
            // apply_tag now takes refs; helper builds them inline.
            let tagRange = (name, start, end) =>
                src.apply_tag(name, src.create_ref(start), src.create_ref(end));
            let lineStart = 0;
            text.split('\n').forEach((line) => {
                if (line.startsWith("//")) {
                    tagRange("comment", lineStart, lineStart + line.length);
                }
                lineStart += line.length + 1;
            });
            let fn = text.indexOf("function");
            if (fn >= 0) tagRange("keyword", fn, fn + "function".length);
            for (let s of ["'Hello, '", "'!'", "'world'"]) {
                let i = text.indexOf(s);
                if (i >= 0) tagRange("string", i, i + s.length);
            }
            subwin = mdi.add_widget(src, {title: "TextSource", width: 420, height: 260});
            break;
        }

        case "TextEntry": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("Press Enter to activate.");
            let entry = new Widgets.TextEntry({text: "Type here", linehistory: 10});
            entry.add_callback('activated', (w, text) => lbl.set_text("Entered: " + text));
            content.add_widget(entry, 0);
            content.add_widget(new Widgets.Label("Password:"), 0);
            let pwEntry = new Widgets.TextEntry({password: true});
            pwEntry.add_callback('activated', (w, text) => lbl.set_text("Password: " + text));
            content.add_widget(pwEntry, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "TextEntry", width: 300, height: 160});
            break;
        }

        case "TextEntrySet": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("Press Enter or click Set.");
            let tes = new Widgets.TextEntrySet({text: "Set", value: "Hello", linehistory: 5});
            tes.add_callback('activated', (w, text) => lbl.set_text("Value: " + text));
            content.add_widget(tes, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "TextEntrySet", width: 300, height: 120});
            break;
        }

        case "TreeView": {
            const _fi = "../pgwidgets_js/static/icons/folder.svg";
            const _di = "../pgwidgets_js/static/icons/file.svg";
            content = new Widgets.VBox();
            content.set_spacing(4);
            let lbl = new Widgets.Label("");
            let tree = new Widgets.TreeView({
                columns: [
                    {label: "Name", key: "NAME", type: "string"},
                    {label: "",     key: "ICON", type: "icon", icon_size: 16},
                    {label: "Type", key: "TYPE", type: "string"},
                    {label: "Size (KB)", key: "SIZE", type: "integer"},
                ],
                selection_mode: "multiple",
                alternate_row_colors: true,
                sortable: true,
            });
            tree.set_tree({
                "Documents": {
                    "__values__": {ICON: _fi, TYPE: "Folder"},
                    "report.pdf": {ICON: _di, TYPE: "PDF",  SIZE: 2400},
                    "notes.txt":  {ICON: _di, TYPE: "Text", SIZE: 12},
                    "Slides": {
                        "__values__": {ICON: _fi, TYPE: "Folder"},
                        "deck.pptx": {ICON: _di, TYPE: "PPTX", SIZE: 5100},
                    },
                },
                "Pictures": {
                    "__values__": {ICON: _fi, TYPE: "Folder"},
                    "photo1.jpg": {ICON: _di, TYPE: "JPEG", SIZE: 3200},
                    "photo2.png": {ICON: _di, TYPE: "PNG",  SIZE: 1800},
                },
                "readme.txt": {ICON: _di, TYPE: "Text", SIZE: 1},
            });
            tree.add_callback('selected', (w, items) => {
                if (items.length === 1) {
                    lbl.set_text("Selected: " + items[0].path.join(" / "));
                } else {
                    lbl.set_text("Selected: " + items.length + " items");
                }
            });
            tree.add_callback('activated', (w, vals, path) =>
                lbl.set_text("Activated: " + path.join(" / ")));
            content.add_widget(tree, 1);
            content.add_widget(lbl, 0);
            subwin = mdi.add_widget(content, {title: "TreeView", width: 420, height: 280});
            break;
        }

        case "ToggleButton": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("");
            content.add_widget(new Widgets.Label("Independent toggles:"), 0);
            let hbox1 = new Widgets.HBox();
            hbox1.set_spacing(4);
            let tb1 = new Widgets.ToggleButton("Bold");
            tb1.add_callback('activated', (w, st) => lbl.set_text("Bold: " + (st ? "on" : "off")));
            let tb2 = new Widgets.ToggleButton("Italic");
            tb2.add_callback('activated', (w, st) => lbl.set_text("Italic: " + (st ? "on" : "off")));
            hbox1.add_widget(tb1, 0);
            hbox1.add_widget(tb2, 0);
            content.add_widget(hbox1, 0);
            content.add_widget(new Widgets.Label("Grouped (exclusive):"), 0);
            let hbox2 = new Widgets.HBox();
            hbox2.set_spacing(4);
            let tg1 = new Widgets.ToggleButton("Left");
            let tg2 = new Widgets.ToggleButton("Center", {group: tg1});
            let tg3 = new Widgets.ToggleButton("Right", {group: tg1});
            tg1.add_callback('activated', (w, st) => { if (st) lbl.set_text("Align: Left"); });
            tg2.add_callback('activated', (w, st) => { if (st) lbl.set_text("Align: Center"); });
            tg3.add_callback('activated', (w, st) => { if (st) lbl.set_text("Align: Right"); });
            hbox2.add_widget(tg1, 0);
            hbox2.add_widget(tg2, 0);
            hbox2.add_widget(tg3, 0);
            content.add_widget(hbox2, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "ToggleButton", width: 300, height: 180});
            break;
        }

        case "ToolBar": {
            content = new Widgets.VBox();
            let lbl = new Widgets.Label("Click toolbar items.");
            lbl.set_padding(8);
            let tb = new Widgets.ToolBar();
            let act1 = tb.add_action({text: "New"});
            act1.add_callback('activated', () => lbl.set_text("New clicked"));
            let act2 = tb.add_action({text: "Open"});
            act2.add_callback('activated', () => lbl.set_text("Open clicked"));
            let act3 = tb.add_action({text: "Save"});
            act3.add_callback('activated', () => lbl.set_text("Save clicked"));
            tb.add_separator();
            let tog1 = tb.add_action({text: "B", toggle: true});
            tog1.add_callback('activated', (w, st) => lbl.set_text("Bold: " + (st ? "on" : "off")));
            let tog2 = tb.add_action({text: "I", toggle: true});
            tog2.add_callback('activated', (w, st) => lbl.set_text("Italic: " + (st ? "on" : "off")));
            content.add_widget(tb, 0);
            content.add_widget(lbl, 1);
            subwin = mdi.add_widget(content, {title: "ToolBar", width: 350, height: 120});
            break;
        }

        case "VBox/HBox": {
            content = new Widgets.VBox();
            content.set_spacing(6);
            content.set_padding(8);
            let lbl = new Widgets.Label("stretch=0 keeps natural size, stretch=1 fills space");
            // HBox with mixed stretch
            let hbox = new Widgets.HBox();
            hbox.set_spacing(4);
            let fixed1 = new Widgets.Button("Fixed (0)");
            let stretch1 = new Widgets.Label("Stretch (1)");
            stretch1.set_color("#e8f0fe", "#333");
            stretch1.set_halign("center");
            let fixed2 = new Widgets.Button("Fixed (0)");
            hbox.add_widget(fixed1, 0);
            hbox.add_widget(stretch1, 1);
            hbox.add_widget(fixed2, 0);
            content.add_widget(new Widgets.Label("HBox — horizontal:"), 0);
            content.add_widget(hbox, 0);
            // Nested VBox inside
            let innerVbox = new Widgets.VBox();
            innerVbox.set_spacing(4);
            let topLabel = new Widgets.Label("Top (stretch=0)");
            topLabel.set_color("#fef7e0", "#333");
            topLabel.set_halign("center");
            let midLabel = new Widgets.Label("Middle (stretch=1)");
            midLabel.set_color("#e8fee8", "#333");
            midLabel.set_halign("center");
            let botLabel = new Widgets.Label("Bottom (stretch=0)");
            botLabel.set_color("#fee8e8", "#333");
            botLabel.set_halign("center");
            innerVbox.add_widget(topLabel, 0);
            innerVbox.add_widget(midLabel, 1);
            innerVbox.add_widget(botLabel, 0);
            content.add_widget(new Widgets.Label("VBox — vertical:"), 0);
            content.add_widget(innerVbox, 1);
            content.add_widget(lbl, 0);
            subwin = mdi.add_widget(content, {title: "VBox / HBox", width: 360, height: 280});
            break;
        }

        default:
            return;
        }

        // position the new subwindow
        let el = subwin.get_element();
        el.style.left = pos.x + 'px';
        el.style.top = pos.y + 'px';
    }

    // --- Wire up Go button ---
    goBtn.add_callback('activated', () => {
        let text = picker.get_text();
        if (text && text !== '') {
            makeDemo(text);
            status.set_text("Opened demo: " + text);
        }
    });

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
