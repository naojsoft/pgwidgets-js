<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Widgets (Pyodide)</title>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: sans-serif; font-size: 18px; color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Pyodide...</div>

  <script type="module">
    import { Widgets } from "../Widgets.js";
    window.Widgets = Widgets;
    window._pgwidgetsReady = true;
  </script>

  <script type="module">
    function waitForWidgets() {
      return new Promise(resolve => {
        const check = () => {
          if (window._pgwidgetsReady) resolve();
          else setTimeout(check, 50);
        };
        check();
      });
    }

    await waitForWidgets();

    let pyodide = await loadPyodide();

    // Mount the pgwidgets_js Python files
    let basePath = new URL('..', window.location.href).pathname;
    pyodide.FS.mkdirTree('/pgwidgets_js');
    pyodide.FS.mkdirTree('/pgwidgets_js/pyodide');

    async function mountFile(url, fsPath) {
      let resp = await fetch(url);
      let text = await resp.text();
      pyodide.FS.writeFile(fsPath, text);
    }

    await Promise.all([
      mountFile(basePath + 'pgwidgets_js/__init__.py', '/pgwidgets_js/__init__.py'),
      mountFile(basePath + 'pgwidgets_js/defs.py', '/pgwidgets_js/defs.py'),
      mountFile(basePath + 'pgwidgets_js/pyodide/__init__.py', '/pgwidgets_js/pyodide/__init__.py'),
      mountFile(basePath + 'pgwidgets_js/pyodide/widget.py', '/pgwidgets_js/pyodide/widget.py'),
    ]);

    pyodide.runPython(`
import sys
if '/' not in sys.path:
    sys.path.insert(0, '/')
    `);

    document.getElementById('loading').style.display = 'none';

    // Store window dimensions for Python to use
    window._innerWidth = window.innerWidth;
    window._innerHeight = window.innerHeight;

    try {
    pyodide.runPython(`
from js import window
from pgwidgets_js.pyodide import (
    TopLevel, VBox, HBox, Button, Label, TextEntry, TextEntrySet,
    TextArea, CheckBox, RadioButton, ToggleButton, ComboBox, SpinBox,
    Slider, Dial, ProgressBar, ScrollBar, ScrollArea, Frame, Expander,
    GridBox, Splitter, Image, MDIWidget, MenuBar, Menu, ToolBar,
    ColorDialog, TreeView,
)

# --- Full-page TopLevel with MDI workspace ---
top = TopLevel(title="All Widgets Demo (Pyodide)", resizable=True)
top.resize(int(window._innerWidth) - 4, int(window._innerHeight) - 4)

vbox = VBox()

# --- Menu bar ---
menubar = MenuBar()
windows_menu = Menu()
cascade_action = windows_menu.add_name("Cascade")
tile_action = windows_menu.add_name("Tile")
menubar.add_menu(windows_menu, "Windows")
vbox.add_widget(menubar, 0)

# --- MDI area ---
mdi = MDIWidget()
vbox.add_widget(mdi, 1)

cascade_action.on("activated", lambda: mdi.cascade_windows())
tile_action.on("activated", lambda: mdi.tile_windows())

# --- Picker ---
picker_content = VBox(spacing=6, padding=8)
picker_label = TextEntry(text="Pick a widget:", editable=False)
picker_content.add_widget(picker_label, 0)

widget_names = [
    "Button", "CheckBox", "ComboBox", "ColorDialog", "Dial",
    "Expander", "Frame", "GridBox", "Image", "Label",
    "ProgressBar", "RadioButton", "ScrollArea", "ScrollBar",
    "Slider", "SpinBox", "Splitter",
    "TextArea", "TextEntry", "TextEntrySet",
    "ToggleButton", "ToolBar", "TreeView", "VBox/HBox",
]

picker = ComboBox(dropdown_limit=8)
for name in widget_names:
    picker.append_text(name)
picker.set_index(0)
picker_content.add_widget(picker, 0)

go_btn = Button("Go!")
picker_content.add_widget(go_btn, 0)
picker_content.add_widget(Label(""), 1)

picker_win = mdi.add_widget(picker_content, {"title": "Widget Picker", "width": 220, "height": 150})

# --- Status label ---
status = Label("Select a widget from the picker to see a demo.")
status.set_padding([6, 4, 6, 4])
vbox.add_widget(status, 0)

# --- Demo creation ---
demo_count = 0

def next_position():
    global demo_count
    demo_count += 1
    return (40 + (demo_count % 6) * 25, 20 + (demo_count % 6) * 25)


def make_demo(name):
    pos = next_position()
    content = None
    subwin = None

    if name == "Button":
        content = VBox(spacing=6, padding=8)
        hbox = HBox(spacing=6)
        lbl = Label("")
        btn_a = Button("Button A")
        btn_a.on("activated", lambda: lbl.set_text("Button A clicked"))
        btn_b = Button("Button B")
        btn_b.on("activated", lambda: lbl.set_text("Button B clicked"))
        btn_icon = Button("With Icon")
        btn_icon.set_icon("../pgwidgets_js/static/icons/pgicon.svg", [16, 16])
        btn_icon.on("activated", lambda: lbl.set_text("Icon button clicked"))
        hbox.add_widget(btn_a, 0)
        hbox.add_widget(btn_b, 0)
        hbox.add_widget(btn_icon, 0)
        content.add_widget(hbox, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "Button", "width": 350, "height": 120})

    elif name == "CheckBox":
        content = VBox(spacing=4, padding=8)
        lbl = Label("")
        cb1 = CheckBox("Option 1")
        cb1.on("activated", lambda val: lbl.set_text(f"Option 1: {'ON' if val else 'OFF'}"))
        cb2 = CheckBox("Option 2")
        cb2.on("activated", lambda val: lbl.set_text(f"Option 2: {'ON' if val else 'OFF'}"))
        cb3 = CheckBox("Option 3")
        cb3.on("activated", lambda val: lbl.set_text(f"Option 3: {'ON' if val else 'OFF'}"))
        content.add_widget(cb1, 0)
        content.add_widget(cb2, 0)
        content.add_widget(cb3, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "CheckBox", "width": 250, "height": 160})

    elif name == "ComboBox":
        content = VBox(spacing=6, padding=8)
        lbl = Label("")
        content.add_widget(Label("Pick-only:"), 0)
        combo1 = ComboBox()
        for f in ["Apple", "Banana", "Cherry", "Date", "Elderberry"]:
            combo1.append_text(f)
        combo1.set_index(0)
        combo1.on("activated", lambda idx, text: lbl.set_text(f"Picked: {text}"))
        content.add_widget(combo1, 0)
        content.add_widget(Label("Editable:"), 0)
        combo2 = ComboBox(editable=True, dropdown_limit=5)
        for f in ["Red", "Orange", "Yellow", "Green", "Blue", "Indigo", "Violet"]:
            combo2.append_text(f)
        combo2.on("activated", lambda idx, text: lbl.set_text(f"Entered: {text}"))
        content.add_widget(combo2, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "ComboBox", "width": 280, "height": 200})

    elif name == "ColorDialog":
        dlg = ColorDialog(color="#3366cc", modal=False)
        dlg._call("set_position", pos[0], pos[1])
        dlg.on("activated", lambda color: status.set_text(f"Color chosen: {color}"))
        dlg.on("pick", lambda color: status.set_text(f"Picking: {color}"))
        dlg.show()
        return

    elif name == "Dial":
        content = HBox(spacing=8, padding=8)
        lbl = Label("50")
        dial1 = Dial(min=0, max=100, value=50, track=True)
        dial1.on("activated", lambda val: lbl.set_text(str(val)))
        dial2 = Dial(min=0, max=100, value=25)
        dial2.on("activated", lambda val: lbl.set_text(str(val)))
        content.add_widget(dial1, 0)
        content.add_widget(dial2, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "Dial", "width": 320, "height": 160})

    elif name == "Expander":
        content = VBox(spacing=4, padding=8)
        exp1 = Expander(title="Section A", collapsible=True)
        exp1.set_widget(Label("Content of section A."))
        exp2 = Expander(title="Section B", collapsible=True)
        exp2.set_widget(Label("Content of section B."))
        content.add_widget(exp1, 0)
        content.add_widget(exp2, 0)
        content.add_widget(Label(""), 1)
        subwin = mdi.add_widget(content, {"title": "Expander", "width": 280, "height": 180})

    elif name == "Frame":
        content = VBox(spacing=6, padding=8)
        frame1 = Frame(title="Titled Frame")
        frame1.set_widget(Label("Content inside a frame."))
        frame2 = Frame(title="Another Frame")
        frame2.set_widget(Label("More framed content."))
        content.add_widget(frame1, 1)
        content.add_widget(frame2, 1)
        subwin = mdi.add_widget(content, {"title": "Frame", "width": 280, "height": 200})

    elif name == "GridBox":
        content = VBox(padding=8, spacing=6)
        lbl = Label("")
        grid = GridBox(rows=3, columns=3)
        for r in range(3):
            for c in range(3):
                btn = Button(f"({r},{c})")
                btn.on("activated", lambda _r=r, _c=c: lbl.set_text(f"Clicked row={_r} col={_c}"))
                grid.add_widget(btn, r, c)
        content.add_widget(grid, 1)
        content.add_widget(lbl, 0)
        subwin = mdi.add_widget(content, {"title": "GridBox", "width": 280, "height": 200})

    elif name == "Image":
        img = Image(url="../pgwidgets_js/static/icons/pgwidgets-logo.svg")
        subwin = mdi.add_widget(img, {"title": "Image", "width": 360, "height": 240})

    elif name == "Label":
        content = VBox(spacing=6, padding=8)
        lbl1 = Label("Default label")
        lbl2 = Label("Centered, colored")
        lbl2.set_halign("center")
        lbl2.set_color("#eef", "darkblue")
        lbl3 = Label("Monospace, bold")
        lbl3.set_font("monospace", 12, "bold")
        content.add_widget(lbl1, 0)
        content.add_widget(lbl2, 0)
        content.add_widget(lbl3, 0)
        content.add_widget(Label(""), 1)
        subwin = mdi.add_widget(content, {"title": "Label", "width": 260, "height": 150})

    elif name == "ProgressBar":
        content = VBox(spacing=6, padding=8)
        pb = ProgressBar()
        pb.set_value(0.65)
        slider = Slider(min=0, max=100, value=65, track=True)
        slider.on("activated", lambda val: pb.set_value(val / 100))
        content.add_widget(Label("Drag slider to change progress:"), 0)
        content.add_widget(slider, 0)
        content.add_widget(pb, 0)
        content.add_widget(Label(""), 1)
        subwin = mdi.add_widget(content, {"title": "ProgressBar", "width": 320, "height": 150})

    elif name == "RadioButton":
        content = VBox(spacing=4, padding=8)
        lbl = Label("")
        rb1 = RadioButton("Choice A")
        rb1.on("activated", lambda val: lbl.set_text("Selected: A") if val else None)
        rb2 = RadioButton("Choice B", group=rb1)
        rb2.on("activated", lambda val: lbl.set_text("Selected: B") if val else None)
        rb3 = RadioButton("Choice C", group=rb1)
        rb3.on("activated", lambda val: lbl.set_text("Selected: C") if val else None)
        rb1.set_state(True)
        content.add_widget(rb1, 0)
        content.add_widget(rb2, 0)
        content.add_widget(rb3, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "RadioButton", "width": 250, "height": 160})

    elif name == "ScrollArea":
        big_content = VBox(spacing=4, padding=8)
        for i in range(30):
            row = HBox(spacing=4)
            for j in range(8):
                lbl = Label(f"Item {i * 8 + j}")
                lbl.set_padding([2, 6, 2, 6])
                lbl.set_color("#f8f8f8" if i % 2 == 0 else "#fff", "#333")
                row.add_widget(lbl, 0)
            big_content.add_widget(row, 0)
        scroll = ScrollArea()
        scroll.set_widget(big_content)
        subwin = mdi.add_widget(scroll, {"title": "ScrollArea", "width": 320, "height": 200})

    elif name == "ScrollBar":
        content = VBox(spacing=8, padding=8)
        lbl = Label("0%")
        content.add_widget(Label("Horizontal:"), 0)
        hsb = ScrollBar(orientation="horizontal")
        hsb.set_thumb_width(0.2)
        hsb.on("activated", lambda pct: lbl.set_text(f"{int(pct * 100)}%"))
        content.add_widget(hsb, 0)
        hbox = HBox(spacing=8)
        hbox.add_widget(Label("Vertical:"), 0)
        vsb = ScrollBar(orientation="vertical")
        vsb.set_thumb_width(0.3)
        vsb.on("activated", lambda pct: lbl.set_text(f"{int(pct * 100)}%"))
        hbox.add_widget(vsb, 0)
        hbox.add_widget(lbl, 1)
        content.add_widget(hbox, 1)
        subwin = mdi.add_widget(content, {"title": "ScrollBar", "width": 280, "height": 200})

    elif name == "Slider":
        content = VBox(spacing=6, padding=8)
        lbl = Label("")
        sl1 = Slider(min=0, max=100, value=50)
        sl1.on("activated", lambda val: lbl.set_text(f"Integer: {val}"))
        sl2 = Slider(min=0, max=1, step=0.01, value=0.5, dtype="float", track=True)
        sl2.on("activated", lambda val: lbl.set_text(f"Float: {val}"))
        content.add_widget(Label("Integer (0-100):"), 0)
        content.add_widget(sl1, 0)
        content.add_widget(Label("Float tracking (0-1):"), 0)
        content.add_widget(sl2, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "Slider", "width": 320, "height": 180})

    elif name == "SpinBox":
        content = VBox(spacing=6, padding=8)
        lbl = Label("")
        content.add_widget(Label("Integer (0-100):"), 0)
        sp1 = SpinBox(min=0, max=100, step=1, value=50)
        sp1.on("activated", lambda val: lbl.set_text(f"Int: {val}"))
        content.add_widget(sp1, 0)
        content.add_widget(Label("Float (0-1):"), 0)
        sp2 = SpinBox(min=0, max=1, step=0.05, value=0.5, dtype="float")
        sp2.on("activated", lambda val: lbl.set_text(f"Float: {val}"))
        content.add_widget(sp2, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "SpinBox", "width": 280, "height": 180})

    elif name == "Splitter":
        content = VBox(padding=4, spacing=4)
        lbl = Label("Drag the handles to resize panes.")
        hsplit = Splitter(orientation="horizontal")
        pane1 = Label("Left")
        pane1.set_halign("center")
        pane1.set_color("#e8f0fe", "#333")
        pane2 = Label("Center")
        pane2.set_halign("center")
        pane2.set_color("#fef7e0", "#333")
        pane3 = Label("Right")
        pane3.set_halign("center")
        pane3.set_color("#e8fee8", "#333")
        hsplit.add_widget(pane1)
        hsplit.add_widget(pane2)
        hsplit.add_widget(pane3)
        content.add_widget(hsplit, 1)
        content.add_widget(lbl, 0)
        subwin = mdi.add_widget(content, {"title": "Splitter", "width": 360, "height": 180})

    elif name == "TextArea":
        ta = TextArea("This is a multi-line text area.\\n\\nYou can type freely here.\\nResize the window to see it adapt.")
        subwin = mdi.add_widget(ta, {"title": "TextArea", "width": 320, "height": 200})

    elif name == "TextEntry":
        content = VBox(spacing=6, padding=8)
        lbl = Label("Press Enter to activate.")
        entry = TextEntry(text="Type here", linehistory=10)
        entry.on("activated", lambda text: lbl.set_text(f"Entered: {text}"))
        content.add_widget(entry, 0)
        content.add_widget(Label("Password:"), 0)
        pw_entry = TextEntry(password=True)
        pw_entry.on("activated", lambda text: lbl.set_text(f"Password: {text}"))
        content.add_widget(pw_entry, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "TextEntry", "width": 300, "height": 160})

    elif name == "TextEntrySet":
        content = VBox(spacing=6, padding=8)
        lbl = Label("Press Enter or click Set.")
        tes = TextEntrySet(text="Set", value="Hello", linehistory=5)
        tes.on("activated", lambda text: lbl.set_text(f"Value: {text}"))
        content.add_widget(tes, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "TextEntrySet", "width": 300, "height": 120})

    elif name == "TreeView":
        fi = "../pgwidgets_js/static/icons/folder.svg"
        di = "../pgwidgets_js/static/icons/file.svg"
        content = VBox(spacing=4)
        lbl = Label("")
        tree = TreeView(
            columns=[{"label": "", "type": "icon", "icon_size": 16},
                     "Name", "Type", {"label": "Size (KB)", "type": "number"}],
            selection_mode="multi",
            alternate_row_colors=True,
        )
        tree.set_tree([
            {"values": [fi, "Documents", "Folder", ""], "children": [
                {"values": [di, "report.pdf", "PDF", 2400]},
                {"values": [di, "notes.txt", "Text", 12]},
                {"values": [fi, "Slides", "Folder", ""], "children": [
                    {"values": [di, "deck.pptx", "PPTX", 5100]},
                ]},
            ]},
            {"values": [fi, "Pictures", "Folder", ""], "children": [
                {"values": [di, "photo1.jpg", "JPEG", 3200]},
                {"values": [di, "photo2.png", "PNG", 1800]},
            ]},
            {"values": [di, "readme.txt", "Text", 1]},
        ])

        def on_tree_selected(items):
            if len(items) == 1:
                lbl.set_text(f"Selected: {items[0]['values'][1]}")
            elif len(items) > 1:
                lbl.set_text(f"Selected: {len(items)} items")
        tree.on("selected", on_tree_selected)
        tree.on("activated", lambda vals: lbl.set_text(f"Activated: {vals[1]}"))
        content.add_widget(tree, 1)
        content.add_widget(lbl, 0)
        subwin = mdi.add_widget(content, {"title": "TreeView", "width": 420, "height": 280})

    elif name == "ToggleButton":
        content = VBox(spacing=6, padding=8)
        lbl = Label("")
        content.add_widget(Label("Independent toggles:"), 0)
        hbox1 = HBox(spacing=4)
        tb1 = ToggleButton("Bold")
        tb1.on("activated", lambda st: lbl.set_text(f"Bold: {'on' if st else 'off'}"))
        tb2 = ToggleButton("Italic")
        tb2.on("activated", lambda st: lbl.set_text(f"Italic: {'on' if st else 'off'}"))
        hbox1.add_widget(tb1, 0)
        hbox1.add_widget(tb2, 0)
        content.add_widget(hbox1, 0)
        content.add_widget(Label("Grouped (exclusive):"), 0)
        hbox2 = HBox(spacing=4)
        tg1 = ToggleButton("Left")
        tg2 = ToggleButton("Center", group=tg1)
        tg3 = ToggleButton("Right", group=tg1)
        tg1.on("activated", lambda st: lbl.set_text("Align: Left") if st else None)
        tg2.on("activated", lambda st: lbl.set_text("Align: Center") if st else None)
        tg3.on("activated", lambda st: lbl.set_text("Align: Right") if st else None)
        hbox2.add_widget(tg1, 0)
        hbox2.add_widget(tg2, 0)
        hbox2.add_widget(tg3, 0)
        content.add_widget(hbox2, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "ToggleButton", "width": 300, "height": 180})

    elif name == "ToolBar":
        content = VBox()
        lbl = Label("Click toolbar items.")
        lbl.set_padding(8)
        tb = ToolBar()
        act1 = tb.add_action({"text": "New"})
        act1.on("activated", lambda: lbl.set_text("New clicked"))
        act2 = tb.add_action({"text": "Open"})
        act2.on("activated", lambda: lbl.set_text("Open clicked"))
        act3 = tb.add_action({"text": "Save"})
        act3.on("activated", lambda: lbl.set_text("Save clicked"))
        tb.add_separator()
        tog1 = tb.add_action({"text": "B", "toggle": True})
        tog1.on("activated", lambda st: lbl.set_text(f"Bold: {'on' if st else 'off'}"))
        tog2 = tb.add_action({"text": "I", "toggle": True})
        tog2.on("activated", lambda st: lbl.set_text(f"Italic: {'on' if st else 'off'}"))
        content.add_widget(tb, 0)
        content.add_widget(lbl, 1)
        subwin = mdi.add_widget(content, {"title": "ToolBar", "width": 350, "height": 120})

    elif name == "VBox/HBox":
        content = VBox(spacing=6, padding=8)
        lbl = Label("stretch=0 keeps natural size, stretch=1 fills space")
        hbox = HBox(spacing=4)
        fixed1 = Button("Fixed (0)")
        stretch1 = Label("Stretch (1)")
        stretch1.set_color("#e8f0fe", "#333")
        stretch1.set_halign("center")
        fixed2 = Button("Fixed (0)")
        hbox.add_widget(fixed1, 0)
        hbox.add_widget(stretch1, 1)
        hbox.add_widget(fixed2, 0)
        content.add_widget(Label("HBox - horizontal:"), 0)
        content.add_widget(hbox, 0)
        inner_vbox = VBox(spacing=4)
        top_label = Label("Top (stretch=0)")
        top_label.set_color("#fef7e0", "#333")
        top_label.set_halign("center")
        mid_label = Label("Middle (stretch=1)")
        mid_label.set_color("#e8fee8", "#333")
        mid_label.set_halign("center")
        bot_label = Label("Bottom (stretch=0)")
        bot_label.set_color("#fee8e8", "#333")
        bot_label.set_halign("center")
        inner_vbox.add_widget(top_label, 0)
        inner_vbox.add_widget(mid_label, 1)
        inner_vbox.add_widget(bot_label, 0)
        content.add_widget(Label("VBox - vertical:"), 0)
        content.add_widget(inner_vbox, 1)
        content.add_widget(lbl, 0)
        subwin = mdi.add_widget(content, {"title": "VBox / HBox", "width": 360, "height": 280})

    else:
        return

    if subwin is not None:
        subwin._call("set_position", pos[0], pos[1])


def on_go():
    text = picker.get_text()
    if text:
        make_demo(text)
        status.set_text(f"Opened demo: {text}")

go_btn.on("activated", on_go)

top.set_widget(vbox)
top.show()

print("All Widgets Pyodide demo ready!")
    `);
    } catch (e) {
      document.getElementById('loading').style.display = '';
      document.getElementById('loading').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  </script>
</body>
</html>
