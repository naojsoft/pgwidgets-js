<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(400, 300);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(8);

    let status = new Widgets.Text({text: ""});

    // integer spinbox
    let label1 = new Widgets.Label("Integer (0 to 100, step 5):");
    vbox.add_widget(label1, 0);

    let intSpin = new Widgets.SpinBox({dtype: 'int', min: 0, max: 100, step: 5, value: 50});
    intSpin.add_callback('activated', (w, val) => {
        status.set_text("Integer value: " + val);
    });
    vbox.add_widget(intSpin, 0);

    // float spinbox
    let label2 = new Widgets.Label("Float (0.0 to 1.0, step 0.05):");
    vbox.add_widget(label2, 0);

    let floatSpin = new Widgets.SpinBox({dtype: 'float', min: 0.0, max: 1.0, step: 0.05, value: 0.5});
    floatSpin.add_callback('activated', (w, val) => {
        status.set_text("Float value: " + val);
    });
    vbox.add_widget(floatSpin, 0);

    vbox.add_widget(status, 0);

    // programmatic control
    let hbox = new Widgets.HBox();
    hbox.set_spacing(4);
    let btn_reset = new Widgets.Button("Reset Both");
    btn_reset.add_callback('activated', () => {
        intSpin.set_value(50);
        floatSpin.set_value(0.5);
        status.set_text("Reset to defaults");
    });
    let btn_limits = new Widgets.Button("Change Int Limits (0-10)");
    btn_limits.add_callback('activated', () => {
        intSpin.set_limits(0, 10, 1);
        status.set_text("Int limits changed to 0-10, step 1");
    });
    hbox.add_widget(btn_reset);
    hbox.add_widget(btn_limits);
    vbox.add_widget(hbox, 0);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
