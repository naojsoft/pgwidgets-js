<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
</div>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(1000, 700);

    let vbox = new Widgets.VBox();
    
    const tab_w = new Widgets.TabWidget({closable: true, reorderable: true, tab_position: 'top'});
    let text = new Widgets.Text({text: "Hello, World!"});
    tab_w.add_widget(text, {title: "Happy 2024"});
    text = new Widgets.Text({text: "Hello, Pappy!"});
    tab_w.add_widget(text, {title: "Yassir!"});
    text = new Widgets.Text({text: "Third tab content!"});
    tab_w.add_widget(text, {title: "Tres"});
    vbox.add_widget(tab_w, 1);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
