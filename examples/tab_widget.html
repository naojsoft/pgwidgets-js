</div>
  <script type="module">
    import { TabWidget, Text, Button, HBox, VBox, ButtonBox,
             TopLevel } from "../Widgets.js";

    let top = new TopLevel();
    top.resize(1000, 700);

    let vbox = new VBox();
    
    const tab_w = new TabWidget({closable: true, reorderable: true, tab_position: 'top'});
    //tab_w.resize(900, 600)
    let text = new Text("Hello, World!");
    tab_w.add_widget(text, {title: "Happy 2024"});
    text = new Text("Hello, Pappy!");
    tab_w.add_widget(text, {title: "Yassir!"});
    text = new Text("Third tab content!");
    tab_w.add_widget(text, {title: "Tres"});
    vbox.add_widget(tab_w);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
