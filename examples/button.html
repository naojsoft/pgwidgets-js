<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(400, 300);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(4);

    let label = new Widgets.Label("Click a button:");
    vbox.add_widget(label, 0);

    let status = new Widgets.Text({text: "(no button pressed yet)"});

    let hbox = new Widgets.HBox();
    hbox.set_spacing(4);

    let btn1 = new Widgets.Button("Say Hello");
    btn1.add_callback('activated', (w) => {
        status.set_text("Hello, World!");
    });
    hbox.add_widget(btn1);

    let btn2 = new Widgets.Button("Say Goodbye");
    btn2.add_callback('activated', (w) => {
        status.set_text("Goodbye, World!");
    });
    hbox.add_widget(btn2);

    vbox.add_widget(hbox, 0);

    // icon buttons
    let label2 = new Widgets.Label("Buttons with icons:");
    vbox.add_widget(label2, 0);

    let hbox2 = new Widgets.HBox();
    hbox2.set_spacing(4);

    // icon only
    let btn3 = new Widgets.Button("");
    btn3.set_icon("../pgwidgets_js/static/icons/pgicon.svg", [24, 24]);
    btn3.add_callback('activated', () => status.set_text("Icon button clicked!"));
    hbox2.add_widget(btn3);

    // icon + text
    let btn4 = new Widgets.Button("PGWidgets");
    btn4.set_icon("../pgwidgets_js/static/icons/pgicon.svg", [32, 32]);
    btn4.add_callback('activated', () => status.set_text("Icon+text button clicked!"));
    hbox2.add_widget(btn4);

    // colored button
    let btn5 = new Widgets.Button("Colored");
    btn5.set_color('#2060a0', 'white');
    btn5.add_callback('activated', () => status.set_text("Colored button clicked!"));
    hbox2.add_widget(btn5);

    vbox.add_widget(hbox2, 0);
    vbox.add_widget(status, 1);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
