<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="../Widgets.css" type="text/css" />
</head>
<body>
  <script type="module">
    import { Widgets } from "../Widgets.js";

    let top = new Widgets.TopLevel();
    top.resize(400, 300);

    let vbox = new Widgets.VBox();
    vbox.set_spacing(4);

    let label = new Widgets.Label({text: "Click a button:"});
    vbox.add_widget(label, 0);

    let status = new Widgets.Text({text: "(no button pressed yet)"});

    let hbox = new Widgets.HBox();
    hbox.set_spacing(4);

    let btn1 = new Widgets.Button("Say Hello");
    btn1.add_callback('activated', (w) => {
        status.set_text("Hello, World!");
    });
    hbox.add_widget(btn1);

    let btn2 = new Widgets.Button("Say Goodbye");
    btn2.add_callback('activated', (w) => {
        status.set_text("Goodbye, World!");
    });
    hbox.add_widget(btn2);

    vbox.add_widget(hbox, 0);
    vbox.add_widget(status, 1);

    top.set_widget(vbox);
    top.show();

  </script>
</body>
</html>
